<svg xmlns="http://www.w3.org/2000/svg" width="700" height="280" viewBox="0 0 700 280">
  <defs>
    <style>.mono { font-family: 'Courier New', Courier, monospace; }</style>
  </defs>

  <!-- Background -->
  <rect width="700" height="280" rx="10" fill="#0d1117"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#f0f6fc">Per-Sample BLEU Scores — 20 GSM8K Test Samples</text>
  <text x="350" y="37" text-anchor="middle" class="mono" font-size="9" fill="#8b949e">Student v2 vs teacher CoT traces · green = answer correct · avg BLEU = 0.329</text>

  <!-- Chart area: x=50..670, y=50..210 (height=160) -->
  <!-- Y range: 0 to 0.70, scale = 160/0.70 = 228.57 px per unit -->
  <!-- Gridlines -->
  <line x1="50" y1="210" x2="670" y2="210" stroke="#30363d" stroke-width="1"/>
  <line x1="50" y1="210" x2="50"  y2="50"  stroke="#30363d" stroke-width="1"/>
  <line x1="50" y1="164" x2="670" y2="164" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="50" y1="118" x2="670" y2="118" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="50" y1="73"  x2="670" y2="73"  stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y axis labels -->
  <text x="43" y="214" text-anchor="end" class="mono" font-size="9" fill="#8b949e">0.0</text>
  <text x="43" y="168" text-anchor="end" class="mono" font-size="9" fill="#8b949e">0.2</text>
  <text x="43" y="122" text-anchor="end" class="mono" font-size="9" fill="#8b949e">0.4</text>
  <text x="43" y="77"  text-anchor="end" class="mono" font-size="9" fill="#8b949e">0.6</text>

  <!-- Y axis label -->
  <text x="14" y="130" text-anchor="middle" class="mono" font-size="9" fill="#8b949e" transform="rotate(-90,14,130)">BLEU</text>

  <!-- Mean line at 0.329: y = 210 - 0.329*228.57 = 210 - 75.2 = 134.8 → 135 -->
  <line x1="50" y1="135" x2="670" y2="135" stroke="#e3b341" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="674" y="138" class="mono" font-size="9" fill="#e3b341">μ=0.329</text>

  <!-- 20 bars, each slot = (670-50)/20 = 31px, bar width=20, offset=5.5 -->
  <!-- Heights: bleu * 228.57, y = 210 - height -->
  <!-- Colors: green (#3fb950) for id=11,13 (correct), #58a6ff for rest -->

  <!-- id=0: BLEU=0.462, h=105.6→106, y=104 -->
  <rect x="55"  y="104" width="20" height="106" rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=1: BLEU=0.529, h=120.9→121, y=89 -->
  <rect x="86"  y="89"  width="20" height="121" rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=2: BLEU=0.280, h=64.0→64, y=146 -->
  <rect x="117" y="146" width="20" height="64"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=3: BLEU=0.200, h=45.7→46, y=164 -->
  <rect x="148" y="164" width="20" height="46"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=4: BLEU=0.629, h=143.8→144, y=66 -->
  <rect x="179" y="66"  width="20" height="144" rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=5: BLEU=0.231, h=52.8→53, y=157 -->
  <rect x="210" y="157" width="20" height="53"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=6: BLEU=0.586, h=134.0→134, y=76 -->
  <rect x="241" y="76"  width="20" height="134" rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=7: BLEU=0.423, h=96.7→97, y=113 -->
  <rect x="272" y="113" width="20" height="97"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=8: BLEU=0.231, h=52.8→53, y=157 -->
  <rect x="303" y="157" width="20" height="53"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=9: BLEU=0.267, h=61.0→61, y=149 -->
  <rect x="334" y="149" width="20" height="61"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=10: BLEU=0.194, h=44.3→44, y=166 -->
  <rect x="365" y="166" width="20" height="44"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=11: BLEU=0.375, h=85.7→86, y=124 — CORRECT (Toula/bakery) -->
  <rect x="396" y="124" width="20" height="86"  rx="2" fill="#3fb950" opacity="0.9"/>
  <!-- id=12: BLEU=0.333, h=76.1→76, y=134 -->
  <rect x="427" y="134" width="20" height="76"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=13: BLEU=0.263, h=60.1→60, y=150 — CORRECT (Melanie/saleswoman) -->
  <rect x="458" y="150" width="20" height="60"  rx="2" fill="#3fb950" opacity="0.9"/>
  <!-- id=14: BLEU=0.324, h=74.1→74, y=136 -->
  <rect x="489" y="136" width="20" height="74"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=15: BLEU=0.171, h=39.1→39, y=171 -->
  <rect x="520" y="171" width="20" height="39"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=16: BLEU=0.316, h=72.2→72, y=138 -->
  <rect x="551" y="138" width="20" height="72"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=17: BLEU=0.300, h=68.6→69, y=141 -->
  <rect x="582" y="141" width="20" height="69"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=18: BLEU=0.278, h=63.5→64, y=146 -->
  <rect x="613" y="146" width="20" height="64"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=19: BLEU=0.180, h=41.1→41, y=169 -->
  <rect x="644" y="169" width="20" height="41"  rx="2" fill="#58a6ff" opacity="0.8"/>

  <!-- Correct answer markers -->
  <text x="406" y="118" text-anchor="middle" class="mono" font-size="9" fill="#3fb950">✓</text>
  <text x="468" y="144" text-anchor="middle" class="mono" font-size="9" fill="#3fb950">✓</text>

