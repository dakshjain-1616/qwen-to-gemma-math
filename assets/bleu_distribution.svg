  <text x="251" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">6</text>
  <text x="282" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">7</text>
  <text x="313" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">8</text>
  <text x="344" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">9</text>
  <text x="375" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">10</text>
  <text x="406" y="222" text-anchor="middle" class="mono" font-size="8" fill="#3fb950">11</text>
  <text x="437" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">12</text>
  <text x="468" y="222" text-anchor="middle" class="mono" font-size="8" fill="#3fb950">13</text>
  <text x="499" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">14</text>
  <text x="530" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">15</text>
  <text x="561" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">16</text>
  <text x="592" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">17</text>
  <text x="623" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">18</text>
  <text x="654" y="222" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">19</text>
  <text x="360" y="235" text-anchor="middle" class="mono" font-size="9" fill="#8b949e">Sample ID</text>

  <!-- Legend and stats -->
  <rect x="50" y="248" width="600" height="26" rx="5" fill="#161b22"/>
  <rect x="60" y="255" width="10" height="10" rx="2" fill="#58a6ff" opacity="0.8"/>
  <text x="74" y="264" class="mono" font-size="9" fill="#8b949e">Incorrect (18 samples)</text>
  <rect x="180" y="255" width="10" height="10" rx="2" fill="#3fb950" opacity="0.9"/>
  <text x="194" y="264" class="mono" font-size="9" fill="#3fb950">Correct (2 samples: #11 Toula/bakery, #13 Melanie/saleswoman)</text>
  <text x="520" y="264" class="mono" font-size="9" fill="#e3b341">range: 0.171 – 0.629</text>
